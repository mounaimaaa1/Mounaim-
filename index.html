<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapTools | Encrypted Console</title>
    <style>
        :root {
            --accent: #FFFC00;
            --bg: #0a0a0a;
            --console-bg: #000;
            --glow: 0 0 10px rgba(255, 252, 0, 0.5);
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            border: 1px solid var(--accent);
            box-shadow: var(--glow);
        }

        header h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: var(--glow);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: var(--glow);
        }

        #console {
            background: var(--console-bg);
            height: 300px;
            border: 1px solid #333;
            padding: 15px;
            overflow-y: auto;
            white-space: pre-wrap;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <header><h1>SnapTools</h1></header>
    
    <div class="input-group">
        <input type="text" id="username" placeholder="Enter target Snapchat username...">
        <button onclick="runConsole()">EXECUTE</button>
    </div>

    <div id="console"></div>
</div>

<script>
    async function runConsole() {
        const consoleLog = document.getElementById('console');
        const username = document.getElementById('username').value;
        
        if (!username) return;
        
        consoleLog.innerHTML = '';
        const lines = [
            '[SYSTEM] Connecting to secure gateway...',
            '[INFO] Target username found.',
            '[STATUS] Establishing encrypted tunnel...',
            '[WARNING] Firewall detected - Bypassing...',
            '[SUCCESS] Connection established.',
            '[REQUIRED] Human verification needed to access features.'
        ];

        for (const line of lines) {
            const p = document.createElement('p');
            p.textContent = line;
            consoleLog.appendChild(p);
            consoleLog.scrollTop = consoleLog.scrollHeight;
            await new Promise(resolve => setTimeout(resolve, 1000));
        }
    }
</script>

</body>
</html>
