<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SnapTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --snap-yellow: #FFFC00; --snap-black: #000000; --bg-chat: #09090b; --bg-workspace: #020202; --bg-bubble-user: #1c1c1e; --border-color: #27272a; --text-main: #fafafa; --text-muted: #71717a; --font-main: 'Plus Jakarta Sans', sans-serif; --chat-btn-bg: #0c0c0e; --chat-btn-border: #1e1e22; --menu-bg: rgba(9, 9, 11, 0.95); --alert-bg: rgba(20, 20, 25, 0.85); --alert-border: rgba(255, 68, 68, 0.4); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-workspace); color: var(--text-main); display: flex; justify-content: center; height: 100dvh; overflow: hidden; }
        .chat-container { width: 100%; max-width: 480px; background: var(--bg-chat); display: flex; flex-direction: column; height: 100dvh; position: relative; }
        .chat-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .chat-history { flex: 1; overflow-y: auto; padding: 10px 16px; display: flex; flex-direction: column; gap: 22px; }
        .chat-row { display: flex; gap: 14px; }
        .user-row { flex-direction: row-reverse; }
        .bot-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--snap-yellow); display: flex; align-items: center; justify-content: center; }
        .bot-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .msg-bubble { font-size: 15px; line-height: 1.5; color: var(--text-main); padding-top: 6px; }
        .user-row .msg-bubble { background: var(--bg-bubble-user); padding: 12px 18px; border-radius: 18px; }
        .chat-input-area { padding: 12px 16px; background: var(--bg-chat); border-top: 1px solid var(--border-color); }
        .input-box-container { background: var(--chat-btn-bg); border: 1px solid var(--border-color); border-radius: 30px; display: flex; align-items: center; padding: 6px 8px 6px 20px; }
        .gpt-input { background: transparent; border: none; outline: none; color: var(--text-main); flex-grow: 1; padding: 10px 0; }
        .send-btn { width: 40px; height: 40px; background: var(--text-main); border: none; border-radius: 50%; cursor: pointer; }
        .hidden-row { display: none !important; }
        .options-box { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; width: 100%; }
        .chat-opt-btn { background: var(--chat-btn-bg); border: 1px solid var(--chat-btn-border); color: var(--text-main); padding: 18px; border-radius: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">SnapTools Pro</div>
        <div class="chat-history" id="chatWindow">
            <div class="chat-row ai-row"><div class="bot-avatar"><img src="Logo.JPG"></div><div class="msg-bubble" id="welcomeText">Enter target username:</div></div>
            <div class="chat-row ai-row hidden-row" id="typingBubble"><div class="bot-avatar"><img src="Logo.JPG"></div><div class="msg-bubble">...</div></div>
        </div>
        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="Enter username...">
                <button class="send-btn" id="sendBtn" onclick="submitUserIdentifier()"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInputField = document.getElementById('userInputField');
        const sendBtn = document.getElementById('sendBtn');
        const typingBubble = document.getElementById('typingBubble');

        function showTyping() { typingBubble.classList.remove('hidden-row'); }
        function hideTyping() { typingBubble.classList.add('hidden-row'); }

        async function submitUserIdentifier() {
            const val = userInputField.value.trim();
            if (val === '') return;

            userInputField.disabled = true;
            sendBtn.disabled = true;
            
            // إضافة رسالة المستخدم
            const userRow = document.createElement('div');
            userRow.className = 'chat-row user-row';
            userRow.innerHTML = `<div class="msg-bubble">${val}</div>`;
            chatWindow.appendChild(userRow);

            showTyping();

            try {
                // الربط مع Snapchat
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.snapchat.com/add/' + val)}`);
                const data = await response.json();

                hideTyping();
                if (data.status.http_code === 200) {
                    // إذا وجد البروفايل
                    const aiRow = document.createElement('div');
                    aiRow.className = 'chat-row ai-row';
                    aiRow.innerHTML = `
                        <div class="bot-avatar"><img src="Logo.JPG"></div>
                        <div class="msg-bubble">
                            <div style="background:#1c1c1e; padding:15px; border-radius:15px; border:1px solid #FFFC00;">
                                <div style="color:#FFFC00; font-weight:bold;">User Verified ✅</div>
                                <div>Target: @${val}</div>
                            </div>
                            <div class="options-box">
                                <button class="chat-opt-btn" onclick="alert('Accessing...')">Snapchat Snaping</button>
                                <button class="chat-opt-btn" onclick="alert('Accessing...')">Chat History</button>
                            </div>
                        </div>`;
                    chatWindow.appendChild(aiRow);
                } else {
                    alert("User not found!");
                    userInputField.disabled = false;
                    sendBtn.disabled = false;
                }
            } catch (e) {
                hideTyping();
                alert("Error connecting!");
                userInputField.disabled = false;
                sendBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
