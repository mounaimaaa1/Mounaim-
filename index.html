<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SnapTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* كود الـ CSS ديالك يبقى كيما هو باش ما يتخربقش التصميم */
        :root { --snap-yellow: #FFFC00; --bg-chat: #09090b; --bg-workspace: #020202; --text-main: #fafafa; --border-color: #27272a; }
        body { background-color: var(--bg-workspace); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; justify-content: center; height: 100dvh; overflow: hidden; }
        .chat-container { width: 100%; max-width: 480px; background: var(--bg-chat); display: flex; flex-direction: column; height: 100dvh; }
        .chat-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .chat-history { flex: 1; overflow-y: auto; padding: 20px; }
        .chat-input-area { padding: 20px; background: var(--bg-chat); border-top: 1px solid var(--border-color); }
        .input-box-container { background: #1c1c1e; border-radius: 30px; display: flex; padding: 10px 20px; }
        .gpt-input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .send-btn { background: var(--snap-yellow); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
        .hidden-row { display: none; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">SnapTools Pro</div>
        <div class="chat-history" id="chatWindow">
            <div id="welcomeText">Enter target Snapchat username to verify existence:</div>
            <div class="chat-row ai-row hidden-row" id="typingBubble">...</div>
        </div>
        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="e.g. kristiana.cop">
                <button class="send-btn" id="sendBtn" onclick="submitUserIdentifier()"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInputField = document.getElementById('userInputField');
        const sendBtn = document.getElementById('sendBtn');
        const typingBubble = document.getElementById('typingBubble');

        // دالة التأكد من وجود الـ User فـ Snapchat
        async function submitUserIdentifier() {
            let val = userInputField.value.trim();
            if (val === '') return;

            // إظهار حالة التحميل
            typingBubble.classList.remove('hidden-row');
            userInputField.disabled = true;

            try {
                // الربط مع API للتحقق من وجود البروفايل
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.snapchat.com/add/' + val)}`);
                const data = await response.json();

                if (data.status.http_code === 200) {
                    // إذا كان الـ User موجود
                    typingBubble.classList.add('hidden-row');
                    alert("User @" + val + " found! Proceeding...");
                    // هنا كمل باقي الكود ديالك ديال عرض الـ Options
                } else {
                    typingBubble.classList.add('hidden-row');
                    alert("User NOT found on Snapchat! ❌");
                    userInputField.disabled = false;
                }
            } catch (error) {
                typingBubble.classList.add('hidden-row');
                alert("Connection error! ⚠️");
                userInputField.disabled = false;
            }
        }
    </script>
</body>
</html>
