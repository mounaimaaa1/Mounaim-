<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapTools</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --bg-chat: #09090b;
            --text-main: #fafafa;
            --chat-bubble-ai: #ffffff;
            --chat-text-ai: #000000;
            --chat-bubble-user: #FFFC00;
            --chat-text-user: #000000;
        }

        body { background-color: #000; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        .chat-container {
            max-width: 480px; margin: 0 auto; height: 100dvh;
            background-color: var(--bg-chat);
            background-image: radial-gradient(#27272a 1px, transparent 0);
            background-size: 24px 24px;
            display: flex; flex-direction: column;
        }

        .chat-header {
            padding: 20px; background: #000; border-bottom: 1px solid #27272a;
            display: flex; justify-content: space-between; align-items: center;
        }

        .ai-brand { font-weight: 800; font-size: 20px; color: #fff; }
        .part-snap { color: var(--snap-yellow); }

        .chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .chat-row { display: flex; gap: 10px; align-items: flex-end; }
        .bot-avatar { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: #fff; }
        .bot-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .msg-bubble {
            padding: 12px 16px; border-radius: 18px; font-size: 15px; max-width: 80%;
        }

        .ai-row .msg-bubble { background: var(--chat-bubble-ai); color: var(--chat-text-ai); border-bottom-left-radius: 4px; }
        
        .user-row { flex-direction: row-reverse; }
        .user-row .msg-bubble { background: var(--chat-bubble-user); color: var(--chat-text-user); border-bottom-right-radius: 4px; }

        .chat-input-area { padding: 15px; background: #000; }
        .input-box-container {
            background: #181818; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px;
        }
        .gpt-input { background: transparent; border: none; color: #fff; flex-grow: 1; padding: 10px; outline: none; }
        .send-btn { background: var(--snap-yellow); border-radius: 50%; width: 35px; height: 35px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="ai-brand"><span class="part-snap">Snap</span>Tools</div>
        </div>
        <div class="chat-history" id="chatWindow">
            <div class="chat-row ai-row">
                <div class="bot-avatar"><img src="Logo.JPG" alt="Avatar"></div>
                <div class="msg-bubble">Welcome to SnapTools Pro. Enter target username.</div>
            </div>
        </div>
        <div class="chat-input-area">
            <div class="input-box-container">
                <input type="text" class="gpt-input" id="userInputField" placeholder="Ask anything...">
                <button class="send-btn" id="sendBtn"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>
</body>
</html>
